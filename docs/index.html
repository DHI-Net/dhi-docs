<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DHI Net — Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 2.5rem;
      max-width: 540px;
      width: 100%;
    }
    .badge {
      display: inline-block;
      background: #dcfce7;
      color: #15803d;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 99px;
      margin-bottom: 1rem;
    }
    h1 { font-size: 1.75rem; font-weight: 700; color: #0f172a; margin-bottom: .5rem; }
    .subtitle { color: #64748b; font-size: .95rem; margin-bottom: 2rem; }
    .demos { display: flex; flex-direction: column; gap: 1rem; }
    .demo-link {
      display: block;
      padding: 1.25rem 1.5rem;
      border-radius: 12px;
      border: 2px solid transparent;
      text-decoration: none;
      transition: all .15s;
    }
    .demo-link:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.1); }
    .demo-link.new {
      background: #15803d;
      color: white;
      border-color: #15803d;
    }
    .demo-link.old {
      background: white;
      color: #334155;
      border-color: #e2e8f0;
    }
    .demo-link .label { font-size: .75rem; font-weight: 600; opacity: .7; margin-bottom: .25rem; letter-spacing: .05em; text-transform: uppercase; }
    .demo-link .title { font-size: 1rem; font-weight: 600; }
    .demo-link .desc { font-size: .8rem; margin-top: .25rem; opacity: .75; }
    footer { text-align: center; margin-top: 2rem; font-size: .8rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">DHI Net</div>
    <h1>牧場管理系統 Demo</h1>
    <p class="subtitle">DHI 月報表儀表板，提供多牧場指標監控與牛群資料分析。</p>

    <div class="demos">
      <a class="demo-link new" href="./v2/">
        <div class="label">最新版本 — 2026-04-25</div>
        <div class="title">v2 響應式設計</div>
        <div class="desc">可收合側欄・手機底部導覽・牛隻詳細頁・警示色碼</div>
      </a>
      <a class="demo-link old" href="./v1/">
        <div class="label">舊版本 — 2026-04-25</div>
        <div class="title">v1 初版儀表板</div>
        <div class="desc">多牧場總覽・KPI 卡片・趨勢圖・牛群資料表</div>
      </a>
    </div>

    <footer>靜態 Demo・資料為測試用途・後端 API 尚未連線</footer>
  </div>
</body>
</html>
